# Default application configuration
server:
  host: "0.0.0.0"
  port: 8000
  cors:
    origins:
      - "http://localhost:3000"
    allow_credentials: true
    allow_methods:
      - "*"
    allow_headers:
      - "*"

database:
  url: "sqlite+aiosqlite:///app.db"
  echo: false

logging:
  enabled: true
  level: "INFO"
  dir: "app-logs"
  format: "[时间：%(asctime)s][进程ID:%(process)d][线程ID:%(thread)d][%(class_name)s][%(funcName)s][%(request_id)s] - %(message)s"
  date_format: "%Y-%m-%d %H-%M-%S"

projects:
  root: "projectsRoot"
